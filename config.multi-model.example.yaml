# sbgw final multi-model example
#
# Goal:
#   One Gateway Service/NodePort, many OpenAI-compatible route prefixes.
#
# Recommended client base_url:
#   http://<node-ip>:30088/qwen36-direct/v1   # Qwen3.6 non-thinking
#   http://<node-ip>:30088/qwen36-think/v1    # Qwen3.6 thinking
#   http://<node-ip>:30088/qwen35-direct/v1   # Qwen3.5 non-thinking
#   http://<node-ip>:30088/qwen35-think/v1    # Qwen3.5 thinking
#   http://<node-ip>:30088/deepseek-v4/v1     # DeepSeek V4/V4 Flash chat
#   http://<node-ip>:30088/mimo-asr/v1        # MiMo ASR audio transcription
#
# Two-layer API key rule:
#   auth.*                         = gateway/frontend/user API keys
#   upstream.endpoints[].api_key   = upstream model-service API keys
#
# If upstream does not require auth, keep endpoints[].api_key empty.

server:
  addr: ":12224"
  mode: "release"

log:
  level: "info"
  format: "json"
  log_body: true
  log_headers: false
  max_body_size: 8192
  redact_headers:
    - authorization
    - x-api-key
    - api-key

# First layer: gateway client keys.
auth:
  enabled: true
  header: "Authorization"
  tokens: []
  keys:
    - name: "demo-user"
      key: "sk-demo-user-001"
      quota_tokens: 1000000
      disabled: false
    - name: "ops-user"
      key: "sk-ops-user-001"
      quota_tokens: 5000000
      disabled: false

# Second layer: upstream model services.
upstream:
  timeout: "10m"
  strategy: "weighted_round_robin"
  forward_client_authorization: false

  # Optional compatibility for plain /v1/chat/completions and /v1/audio/transcriptions.
  # With route-prefix URLs, clients may send model=anything because the route decides the real model.
  model_map:
    qwen3.6: "qwen3.6-27b-w8a8"
    qwen3.5: "qwen3.5-32b-w8a8"
    deepseek-v4: "deepseek-v4-flash"
    mimo-asr: "mimo-audio-asr"

  # Route-prefix API:
  #   /qwen36-direct/v1/chat/completions
  #   /qwen36-think/v1/chat/completions
  #   /qwen35-direct/v1/chat/completions
  #   /qwen35-think/v1/chat/completions
  #   /deepseek-v4/v1/chat/completions
  #   /mimo-asr/v1/audio/transcriptions
  routes:
    - name: "qwen36-direct"
      path: "/qwen36-direct"
      kind: "chat"
      adapter: "qwen"
      model: "qwen3.6-direct"
      upstream_model: "qwen3.6-27b-w8a8"
      upstream_path: "/v1/chat/completions"
      endpoints: ["qwen36-a", "qwen36-b"]
      request_patches:
        # vLLM/SGLang common style for Qwen thinking switch.
        - op: set
          path: "chat_template_kwargs.enable_thinking"
          value: false

    - name: "qwen36-think"
      path: "/qwen36-think"
      kind: "chat"
      adapter: "qwen"
      model: "qwen3.6-thinking"
      upstream_model: "qwen3.6-27b-w8a8"
      upstream_path: "/v1/chat/completions"
      endpoints: ["qwen36-a", "qwen36-b"]
      request_patches:
        - op: set
          path: "chat_template_kwargs.enable_thinking"
          value: true

    - name: "qwen35-direct"
      path: "/qwen35-direct"
      kind: "chat"
      adapter: "qwen"
      model: "qwen3.5-direct"
      upstream_model: "qwen3.5-32b-w8a8"
      upstream_path: "/v1/chat/completions"
      endpoints: ["qwen35-a"]
      request_patches:
        - op: set
          path: "chat_template_kwargs.enable_thinking"
          value: false

    - name: "qwen35-think"
      path: "/qwen35-think"
      kind: "chat"
      adapter: "qwen"
      model: "qwen3.5-thinking"
      upstream_model: "qwen3.5-32b-w8a8"
      upstream_path: "/v1/chat/completions"
      endpoints: ["qwen35-a"]
      request_patches:
        - op: set
          path: "chat_template_kwargs.enable_thinking"
          value: true

    # DeepSeek V4 / V4 Flash route.
    # Keep it OpenAI-compatible and delete Qwen-only thinking switches if a client accidentally sends them.
    - name: "deepseek-v4"
      path: "/deepseek-v4"
      kind: "chat"
      adapter: "deepseek-v4"
      model: "deepseek-v4"
      upstream_model: "deepseek-v4-flash"
      upstream_path: "/v1/chat/completions"
      endpoints: ["deepseek-v4-a"]
      request_patches:
        - op: delete
          path: "chat_template_kwargs.enable_thinking"
        - op: delete
          path: "enable_thinking"

    # MiMo ASR route. This proxies multipart/form-data audio files and rewrites the form model field.
    - name: "mimo-asr"
      path: "/mimo-asr"
      kind: "audio_transcription"
      adapter: "mimo-asr"
      model: "mimo-asr"
      upstream_model: "mimo-audio-asr"
      upstream_path: "/v1/audio/transcriptions"
      endpoints: ["mimo-asr-a"]
      request_patches:
        - op: set
          path: "response_format"
          value: "json"

    # Example for an upstream that expects a top-level enable_thinking instead.
    # - name: "qwen36-direct-top-param"
    #   path: "/qwen36-direct-top"
    #   kind: "chat"
    #   adapter: "generic-openai"
    #   model: "qwen3.6-direct-top"
    #   upstream_model: "qwen3.6-27b-w8a8"
    #   upstream_path: "/v1/chat/completions"
    #   endpoints: ["qwen36-a"]
    #   request_patches:
    #     - op: set
    #       path: "enable_thinking"
    #       value: false

  endpoints:
    # Qwen3.6 endpoint A. weight=2 means it gets about twice the traffic of qwen36-b
    # when strategy=weighted_round_robin or weighted_random.
    - name: "qwen36-a"
      base_url: "http://qwen36-a.aict.svc.cluster.local:8000"
      api_key: ""        # e.g. sk-upstream-qwen36-a; keep empty if upstream does not need auth
      weight: 2
      timeout: "10m"
      models: ["qwen3.6", "qwen3.6-direct", "qwen3.6-thinking"]

    - name: "qwen36-b"
      base_url: "http://qwen36-b.aict.svc.cluster.local:8000"
      api_key: ""
      weight: 1
      timeout: "10m"
      models: ["qwen3.6", "qwen3.6-direct", "qwen3.6-thinking"]

    - name: "qwen35-a"
      base_url: "http://qwen35-a.aict.svc.cluster.local:8000"
      api_key: ""
      weight: 1
      timeout: "10m"
      models: ["qwen3.5", "qwen3.5-direct", "qwen3.5-thinking"]

    - name: "deepseek-v4-a"
      base_url: "http://deepseek-v4.aict.svc.cluster.local:8000"
      api_key: ""
      weight: 1
      timeout: "10m"
      models: ["deepseek-v4"]

    - name: "mimo-asr-a"
      base_url: "http://mimo-asr.aict.svc.cluster.local:8000"
      api_key: ""
      weight: 1
      timeout: "30m"
      models: ["mimo-asr"]

transform:
  enabled: true
  inject_think_tag: true
  strip_reasoning_fields: true
  parse_think_from_content: true
  reorder_system_messages: true
  reasoning_fields:
    - reasoning_content
    - reasoning
