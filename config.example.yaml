server:
  addr: ":12224"
  mode: "release"

log:
  level: "info"
  format: "json"
  log_body: true
  max_body_size: 8192

auth:
  enabled: true
  header: "Authorization"
  tokens:
    - "sk-local-dev-001"

upstream:
  base_url: "http://127.0.0.1:18489"
  timeout: "10m"
  api_key: ""
  # false: gateway SK Authorization is not forwarded to upstream.
  # true: keep client Authorization header when api_key is empty.
  forward_client_authorization: false

transform:
  enabled: true
  inject_think_tag: true
  strip_reasoning_fields: true
  parse_think_from_content: true
  # Only these fields are consumed as reasoning. All other fields are passthrough.
  reasoning_fields:
    - reasoning_content
    - reasoning
