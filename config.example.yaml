# sbgw example configuration
#
# For a production-style multi-model example, see config.multi-model.example.yaml
# or run: ./sbgw-<version>-linux-<arch>.run example-config > config.multi-model.yaml
#
# 推荐接入方式：
#   http://<gateway>:30088/qwen36-direct/v1/chat/completions
#   http://<gateway>:30088/qwen36-think/v1/chat/completions
#   http://<gateway>:30088/deepseek-v4/v1/chat/completions
#   http://<gateway>:30088/mimo-asr/v1/audio/transcriptions
#
# OpenAI SDK 可把 base_url 设置为：
#   http://<gateway>:30088/qwen36-direct/v1
#   http://<gateway>:30088/qwen36-think/v1
#   http://<gateway>:30088/deepseek-v4/v1
#   http://<gateway>:30088/mimo-asr/v1
#
# API key 分两层：
#   1. auth.* 是调用网关的前端/用户 key。
#   2. upstream.* / endpoints[].api_key 是上游模型服务 key。
# 默认不会把前端 Authorization 透传给上游。

server:
  addr: ":12224"
  mode: "release"

log:
  level: "info"
  format: "json"
  log_body: true
  log_headers: false
  max_body_size: 8192
  redact_headers:
    - authorization
    - x-api-key
    - api-key

# 第一层 API key：这是网关自己的前端/客户端 key，和上游模型服务 key 完全隔离。
auth:
  enabled: true
  header: "Authorization"
  # 兼容旧配置：只校验，不限额。
  tokens:
    - "sk-local-dev-001"
  # 新配置：支持多用户、多 key、token 额度。quota_tokens <= 0 表示不限额。
  keys:
    - name: "demo-user"
      key: "sk-demo-user-001"
      quota_tokens: 1000000
      disabled: false

# 第二层 API key：这是上游模型服务需要鉴权时才填写的 key。
upstream:
  # 兼容旧配置：没有 endpoints 时自动转换成 default endpoint。
  base_url: "http://127.0.0.1:18489"
  timeout: "10m"
  api_key: ""
  forward_client_authorization: false

  # 负载策略：round_robin | weighted_round_robin | random | weighted_random | least_inflight
  strategy: "weighted_round_robin"

  # 兼容 /v1/chat/completions 和 /v1/audio/transcriptions：
  # 前端传逻辑模型名，网关改写成上游真实 model。
  model_map:
    qwen3.6: "qwen3.6-27b-w8a8"
    qwen3.5: "qwen3.5-32b-w8a8"
    deepseek-v4: "deepseek-v4-flash"
    mimo-asr: "mimo-audio-asr"

  # 一个公网端口 + 多个 route 前缀：推荐 /{path}/v1/...
  # kind 默认是 chat；MiMo ASR 这类语音识别入口使用 kind: audio_transcription。
  # adapter 是兼容性标签，用于日志/文档归类；真正的参数变换仍然用 request_patches 明确控制。
  routes:
    # vLLM/SGLang 一类上游：通常识别 chat_template_kwargs.enable_thinking。
    - name: "qwen36-think"
      path: "/qwen36-think"
      kind: "chat"
      adapter: "qwen"
      model: "qwen3.6-thinking"
      upstream_model: "qwen3.6-27b-w8a8"
      upstream_path: "/v1/chat/completions"
      endpoints: ["qwen36-a", "qwen36-b"]
      request_patches:
        - op: set
          path: "chat_template_kwargs.enable_thinking"
          value: true

    - name: "qwen36-direct"
      path: "/qwen36-direct"
      kind: "chat"
      adapter: "qwen"
      model: "qwen3.6-direct"
      upstream_model: "qwen3.6-27b-w8a8"
      upstream_path: "/v1/chat/completions"
      endpoints: ["qwen36-a", "qwen36-b"]
      request_patches:
        - op: set
          path: "chat_template_kwargs.enable_thinking"
          value: false

    - name: "qwen35-think"
      path: "/qwen35-think"
      kind: "chat"
      adapter: "qwen"
      model: "qwen3.5-thinking"
      upstream_model: "qwen3.5-32b-w8a8"
      upstream_path: "/v1/chat/completions"
      endpoints: ["qwen35-a"]
      request_patches:
        - op: set
          path: "chat_template_kwargs.enable_thinking"
          value: true

    - name: "qwen35-direct"
      path: "/qwen35-direct"
      kind: "chat"
      adapter: "qwen"
      model: "qwen3.5-direct"
      upstream_model: "qwen3.5-32b-w8a8"
      upstream_path: "/v1/chat/completions"
      endpoints: ["qwen35-a"]
      request_patches:
        - op: set
          path: "chat_template_kwargs.enable_thinking"
          value: false

    # DeepSeek V4 / V4 Flash 示例：保守透传 OpenAI-compatible chat。
    # 网关会统一兼容 reasoning/reasoning_content 返回，并可删除 Qwen 专属参数，避免污染 DeepSeek 请求。
    - name: "deepseek-v4"
      path: "/deepseek-v4"
      kind: "chat"
      adapter: "deepseek-v4"
      model: "deepseek-v4"
      upstream_model: "deepseek-v4-flash"
      upstream_path: "/v1/chat/completions"
      endpoints: ["deepseek-v4-a"]
      request_patches:
        - op: delete
          path: "chat_template_kwargs.enable_thinking"
        - op: delete
          path: "enable_thinking"

    # MiMo ASR 示例：OpenAI-compatible multipart/form-data 音频转写。
    # 客户端请求 /mimo-asr/v1/audio/transcriptions，网关会把 multipart 里的 model 改写为 upstream_model。
    - name: "mimo-asr"
      path: "/mimo-asr"
      kind: "audio_transcription"
      adapter: "mimo-asr"
      model: "mimo-asr"
      upstream_model: "mimo-audio-asr"
      upstream_path: "/v1/audio/transcriptions"
      endpoints: ["mimo-asr-a"]
      request_patches:
        - op: set
          path: "response_format"
          value: "json"

    # 阿里云 DashScope/Model Studio 兼容接口示例：通常识别顶层 enable_thinking。
    # - name: "qwen35-direct-dashscope"
    #   path: "/qwen35-direct"
    #   kind: "chat"
    #   adapter: "dashscope"
    #   model: "qwen3.5-direct"
    #   upstream_model: "qwen3.5-plus"
    #   endpoints: ["dashscope"]
    #   request_patches:
    #     - op: set
    #       path: "enable_thinking"
    #       value: false

  # 多上游。models 用网关逻辑模型名；为空表示兜底支持所有模型。
  # route.endpoints 可限制某个 route 只能使用指定 endpoint。
  endpoints:
    - name: "qwen36-a"
      base_url: "http://127.0.0.1:18489"
      api_key: ""
      weight: 2
      timeout: "10m"
      models: ["qwen3.6", "qwen3.6-thinking", "qwen3.6-direct"]
    - name: "qwen36-b"
      base_url: "http://127.0.0.1:18490"
      api_key: ""
      weight: 1
      timeout: "10m"
      models: ["qwen3.6", "qwen3.6-thinking", "qwen3.6-direct"]
    - name: "qwen35-a"
      base_url: "http://127.0.0.1:18491"
      api_key: ""
      weight: 1
      timeout: "10m"
      models: ["qwen3.5", "qwen3.5-thinking", "qwen3.5-direct"]
    - name: "deepseek-v4-a"
      base_url: "http://127.0.0.1:18492"
      api_key: ""
      weight: 1
      timeout: "10m"
      models: ["deepseek-v4"]
    - name: "mimo-asr-a"
      base_url: "http://127.0.0.1:18493"
      api_key: ""
      weight: 1
      timeout: "30m"
      models: ["mimo-asr"]

transform:
  enabled: true
  inject_think_tag: true
  strip_reasoning_fields: true
  parse_think_from_content: true
  # Qwen 3.5/3.6 等模型要求 system message 必须在 messages 第一条。
  # 开启后网关会把历史消息中后置的 system message 稳定移动到最前面。
  reorder_system_messages: true
  # Only these fields are consumed as reasoning. All other fields are passthrough.
  reasoning_fields:
    - reasoning_content
    - reasoning
