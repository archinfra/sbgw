server:
  addr: ":12224"
  mode: "release"

log:
  level: "info"
  format: "json"
  log_body: true
  log_headers: false
  max_body_size: 8192
  redact_headers:
    - authorization
    - x-api-key
    - api-key

# First layer: gateway client keys.
auth:
  enabled: false
  header: "Authorization"
  tokens: []
  keys:
    - name: "demo-user"
      key: "sk-demo-user-001"
      quota_tokens: 1000000
      disabled: false
    - name: "ops-user"
      key: "sk-ops-user-001"
      quota_tokens: 5000000
      disabled: false

upstream:
  timeout: "10m"
  strategy: "weighted_round_robin"
  forward_client_authorization: false
  model_map:
    qwen3.6: "qwen3.6-27b-w8a8"
    qwen3.5: "Qwen3.5-35B"

  # Route-prefix API:
  #   /qwen36-direct/v1/chat/completions
  #   /qwen36-think/v1/chat/completions
  #   /qwen35-direct/v1/chat/completions
  #   /qwen35-think/v1/chat/completions
  routes:
    - name: "qwen36-direct"
      path: "/qwen36-direct"
      model: "qwen3.6-direct"
      upstream_model: "qwen3.6-27b-w8a8"
      upstream_path: "/v1/chat/completions"
      endpoints: [ "qwen36"]
      request_patches:
        # vLLM/SGLang common style for Qwen thinking switch.
        - op: set
          path: "chat_template_kwargs.enable_thinking"
          value: false

    - name: "qwen36-think"
      path: "/qwen36-think"
      model: "qwen3.6-thinking"
      upstream_model: "qwen3.6-27b-w8a8"
      upstream_path: "/v1/chat/completions"
      endpoints: [ "qwen36"]
      request_patches:
        - op: set
          path: "chat_template_kwargs.enable_thinking"
          value: true

    - name: "qwen35-direct"
      path: "/qwen35-direct"
      model: "qwen3.5-direct"
      upstream_model: "Qwen3.5-35B"
      upstream_path: "/v1/chat/completions"
      endpoints: ["qwen35"]
      request_patches:
        - op: set
          path: "chat_template_kwargs.enable_thinking"
          value: false

    - name: "qwen35-think"
      path: "/qwen35-think"
      model: "qwen3.5-thinking"
      upstream_model: "Qwen3.5-35B"
      upstream_path: "/v1/chat/completions"
      endpoints: ["qwen35"]
      request_patches:
        - op: set
          path: "chat_template_kwargs.enable_thinking"
          value: true

  endpoints:
    # Qwen3.6 endpoint A. weight=2 means it gets about twice the traffic of qwen36-b
    # when strategy=weighted_round_robin or weighted_random.
    - name: "qwen36"
      base_url: "http://192.168.2.3:18489"
      api_key: ""        # e.g. sk-upstream-qwen36-a; keep empty if upstream does not need auth
      weight: 1
      timeout: "10m"
      models: ["qwen3.6", "qwen3.6-direct", "qwen3.6-thinking"]
    - name: "qwen35"
      base_url: "http://192.168.2.3:8889"
      api_key: "sk-f1079f6d672266c54ed55d042ab801b29b4e00593182e90d"
      weight: 1
      timeout: "10m"
      models: ["qwen3.5", "qwen3.5-direct", "qwen3.5-thinking"]
transform:
  enabled: true
  inject_think_tag: true
  strip_reasoning_fields: true
  parse_think_from_content: true
  reorder_system_messages: true
  reasoning_fields:
    - reasoning_content
    - reasoning